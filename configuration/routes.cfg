[contacts_general]
description = "List with all contacts (without persons)"
brick = "forms contacts-general"
group = "read"

[contacts_persons]
description = "List with all persons"
brick = "forms persons"
group = "read and write"

[contacts_places]
description = "List with all contacts that are places"
brick = "forms places"
group = "read"

["contacts_profile[*]"]
description = "Internal profile page of a contact, if no special path is given"
brick = "request contact *"
brick_local_settings[scope] = 0
include_access[] = contacts_profile

["contacts_profile[person]"]
description = "Internal profile page of a person"
brick = "request contact *"
brick_local_settings[scope] = person
include_access[] = contacts_profile

["contacts_relations[staff]"]
description = "Staff list of an organisation (contact)"
brick = "forms contacts-contacts"
brick_local_settings[scope] = staff
group = "read and write"

[contacts_verification]
description = "Confirm an e-mail address (double opt-in)"
brick = "make contactverification"
group = public
